<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kelime Oyunu v2.5</title>
    <style>
        :root {
            --bg-color: #121214;
            --card-bg: #1a1a1e;
            --accent: #ff4757;
            --accent-hover: #ff6b81;
            --text: #ffffff;
            --text-secondary: #a4b0be;
        }
        
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background-color: var(--bg-color); color: var(--text); display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 15px; }
        
        .container { width: 100%; max-width: 500px; background: var(--card-bg); padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; }
        
        h1 { font-size: 24px; margin-bottom: 10px; color: var(--text); }
        .stats { font-size: 14px; color: var(--text-secondary); margin-bottom: 20px; display: flex; justify-content: space-between; padding: 0 10px; }
        
        /* Mod Seçim Butonları */
        .mode-container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 25px; }
        .mode-btn { background: #2f3542; border: 2px solid transparent; color: var(--text-secondary); padding: 12px 8px; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 13px; transition: all 0.2s; }
        .mode-btn.active { background: #3742fa; color: white; border-color: #535c68; }
        .mode-btn.challenge-mode.active { background: var(--accent); }
        
        /* Oyun Alanı */
        .card { background: #2f3542; padding: 35px 20px; border-radius: 16px; margin-bottom: 25px; min-height: 140px; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; overflow: hidden; border: 1px solid #3f4656; }
        .word-num { font-size: 13px; color: var(--accent); font-weight: bold; text-transform: uppercase; margin-bottom: 8px; letter-spacing: 1px; }
        .word-text { font-size: 32px; font-weight: bold; word-break: break-word; }
        
        /* Cevap Girişi */
        .input-group { display: flex; flex-direction: column; gap: 12px; }
        input[type="text"] { width: 100%; padding: 16px; border-radius: 12px; border: 2px solid #3f4656; background: #222733; color: white; font-size: 18px; text-align: center; outline: none; transition: border-color 0.2s; }
        input[type="text"]:focus { border-color: #3742fa; }
        
        /* Bildirimler */
        .feedback { margin-top: 15px; font-weight: bold; font-size: 16px; min-height: 24px; }
        .correct { color: #2ed573; }
        .incorrect { color: #ff4757; }
        
        /* Can Barı */
        .hearts { font-size: 18px; margin-bottom: 10px; color: #ff4757; display: none; }
    </style>
</head>
<body>

<div class="container">
    <h1>Kelime Oyunu</h1>
    
    <!-- Oyun Modları -->
    <div class="mode-container">
        <button class="mode-btn active" onclick="changeMode('sıralı')">1-2-3 Sıralı</button>
        <button class="mode-btn" onclick="changeMode('karışık')">Karışık Mod</button>
        <button class="mode-btn" onclick="changeMode('alfabetik')">Alfabetik</button>
        <button class="mode-btn challenge-mode" onclick="changeMode('challenge')">Meydan Okuma</button>
    </div>

    <div class="hearts" id="hearts-display">❤️❤️❤️</div>

    <div class="stats">
        <span id="score-display">Skor: 0</span>
        <span id="progress-display">İlerleme: 0 / 1000</span>
    </div>

    <div class="card">
        <div class="word-num" id="info-tag">Sıra: 1</div>
        <div class="word-text" id="question-word">Yükleniyor...</div>
    </div>

    <div class="input-group">
        <!-- Otomatik kontrol için input her değiştiğinde checkAnswer tetiklenecek -->
        <input type="text" id="user-input" placeholder="Anlamını yazmaya başlayın..." autocomplete="off" autofocus oninput="checkAnswer()">
    </div>

    <div class="feedback" id="feedback-msg"></div>
</div>

<script>
    // Dinamik Değişkenler
    let currentPool = []; 
    let currentIndex = 0; 
    let currentMode = 'sıralı'; 
    let score = 0;
    let lives = 3;
    let lockInput = false; // Geçiş esnasında yazmayı engellemek için

    window.onload = function() {
        initGame('sıralı');
    };

    function changeMode(mode) {
        currentMode = mode;
        const buttons = document.querySelectorAll('.mode-btn');
        buttons.forEach(btn => btn.classList.remove('active'));
        
        if(mode === 'sıralı') buttons[0].classList.add('active');
        if(mode === 'karışık') buttons[1].classList.add('active');
        if(mode === 'alfabetik') buttons[2].classList.add('active');
        if(mode === 'challenge') buttons[3].classList.add('active');

        initGame(mode);
    }

    function initGame(mode) {
        score = 0;
        lives = 3;
        currentIndex = 0;
        lockInput = false;
        
        document.getElementById("feedback-msg").textContent = "";
        document.getElementById("user-input").value = "";
        document.getElementById("user-input").disabled = false;
        document.getElementById("hearts-display").style.display = (mode === 'challenge') ? 'block' : 'none';
        document.getElementById("hearts-display").textContent = "❤️❤️❤️";

        if (mode === 'sıralı' || mode === 'challenge') {
            currentPool = [...masterPool];
        } else if (mode === 'karışık') {
            currentPool = [...masterPool];
            for (let i = currentPool.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [currentPool[i], currentPool[j]] = [currentPool[j], currentPool[i]];
            }
        } else if (mode === 'alfabetik') {
            currentPool = [...masterPool].sort((a, b) => a.eng.localeCompare(b.eng, 'en'));
        }

        showWord();
    }

    function showWord() {
        if (currentIndex >= currentPool.length) {
            document.getElementById("question-word").textContent = "🎉 Harika! Tüm kelimeler bitti.";
            document.getElementById("info-tag").textContent = "TEBRİKLER";
            document.getElementById("user-input").disabled = true;
            return;
        }

        const currentWord = currentPool[currentIndex];
        document.getElementById("question-word").textContent = currentWord.eng;
        
        document.getElementById("score-display").textContent = "Skor: " + score;
        document.getElementById("progress-display").textContent = `İlerleme: ${currentIndex} / ${currentPool.length}`;
        
        if (currentMode === 'sıralı') {
            document.getElementById("info-tag").textContent = "Sıra: " + (currentIndex + 1);
        } else if (currentMode === 'karışık') {
            document.getElementById("info-tag").textContent = "Karışık Mod";
        } else if (currentMode === 'alfabetik') {
            document.getElementById("info-tag").textContent = "Alfabetik Mod";
        } else if (currentMode === 'challenge') {
            document.getElementById("info-tag").textContent = "Seri / Kalan Can: " + lives;
        }
        
        lockInput = false;
        document.getElementById("user-input").focus();
    }

    // OTOMATİK CEVAP KONTROLÜ
    function checkAnswer() {
        if (lockInput) return; // Geçiş sürecindeyse işlem yapma

        const userInput = document.getElementById("user-input").value.trim().toLowerCase();
        const feedback = document.getElementById("feedback-msg");
        
        if (!userInput) return;

        const correctAnswer = currentPool[currentIndex].tr.toLowerCase();

        // Eğer kullanıcı kelimeyi TAM ve DOĞRU yazdıysa anında tetiklenir
        if (userInput === correctAnswer) {
            lockInput = true; // Yeni kelime gelene kadar girdiyi kilitle
            feedback.className = "feedback correct";
            feedback.textContent = "✓ Doğru!";
            score++;
            currentIndex++;
            
            // Yarım saniye sonra kelimeyi değiştir ve kutuyu temizle
            setTimeout(() => {
                feedback.textContent = "";
                document.getElementById("user-input").value = "";
                showWord();
            }, 500);
        } 
        // Yanlış yazıyorsa ama Challenge modundaysa ve harf sayısı doğru cevaba ulaştıysa (Hata tetikleme)
        else if (currentMode === 'challenge' && userInput.length >= correctAnswer.length) {
            lockInput = true;
            feedback.className = "feedback incorrect";
            feedback.textContent = `✗ Yanlış! Doğrusu: ${correctAnswer}`;
            lives--;
            document.getElementById("hearts-display").textContent = "❤️".repeat(lives);
            currentIndex++;

            if (lives <= 0) {
                setTimeout(() => {
                    alert(`Oyun Bitti! Skorun: ${score}`);
                    initGame('challenge');
                }, 500);
                return;
            }

            setTimeout(() => {
                feedback.textContent = "";
                document.getElementById("user-input").value = "";
                showWord();
            }, 1000);
        }
    }
