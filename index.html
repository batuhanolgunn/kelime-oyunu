        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            color: #333;
        }
        .game-container {
            background-color: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 500px;
            text-align: center;
        }
        .stats {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            margin-bottom: 20px;
            font-size: 1.1rem;
            color: #555;
        }
        .mode-badge {
            background-color: #e53e3e;
            color: white;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.8rem;
            letter-spacing: 1px;
            margin-bottom: 15px;
            display: inline-block;
        }
        .question-box {
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 30px;
            color: #2d3748;
        }
        .options-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }
        .btn {
            background-color: #f7fafc;
            border: 2px solid #e2e8f0;
            padding: 15px;
            font-size: 1.1rem;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            outline: none;
            font-weight: 500;
        }
        .btn:hover:not([disabled]) {
            background-color: #edf2f7;
            border-color: #cbd5e0;
            transform: translateY(-2px);
        }
        .btn.correct {
            background-color: #48bb78 !important;
            color: white !important;
            border-color: #38a169 !important;
        }
        .btn.wrong {
            background-color: #f56565 !important;
            color: white !important;
            border-color: #e53e3e !important;
        }
    </style>
</head>

    // 1. ALFABETİK MOD: Kelime havuzunu alfabetik sıraya göre (eng) diziyoruz.
    wordPool.sort((a, b) => a.eng.localeCompare(b.eng));

    let currentIndex = 0;
    let score = 0;
    let questionCount = 0;
    let currentQuestion = null;

    function initGame() {
        currentIndex = 0;
        score = 0;
        questionCount = 0;
        document.getElementById('score').innerText = score;
        document.getElementById('question-count').innerText = questionCount;
        loadQuestion();
    }

    function loadQuestion() {
        // Havuzdaki tüm kelimeler bittiğinde (Aynı kelime birbirini tekrar etmez)
        if (currentIndex >= wordPool.length) {
            document.getElementById('question').innerText = "🎉 Tebrikler! Tüm kelimeleri başarıyla bitirdiniz.";
            document.getElementById('options').innerHTML = "";
            return;
        }

        currentQuestion = wordPool[currentIndex];
        questionCount++;
        document.getElementById('question-count').innerText = questionCount;
        document.getElementById('question').innerText = currentQuestion.eng;

        // Yanlış şıkları belirlemek için mevcut kelime haricindeki kelimelerden rastgele seçiyoruz
        let wrongOptions = wordPool
            .filter(item => item.tr !== currentQuestion.tr)
            .map(item => item.tr);
        
        // Benzersiz yanlış şıklar elde etmek için Set kullanıyoruz
        wrongOptions = [...new Set(wrongOptions)];
        
        // Karıştırıp ilk 3 tanesini alıyoruz
        wrongOptions.sort(() => Math.random() - 0.5);
        let selectedWrong = wrongOptions.slice(0, 3);

        // Doğru şıkla birleştirip toplam 4 şık yapıyoruz
        let allOptions = [currentQuestion.tr, ...selectedWrong];
        allOptions.sort(() => Math.random() - 0.5);

        // Şıkları ekrana basma
        const optionsContainer = document.getElementById('options');
        optionsContainer.innerHTML = "";

        allOptions.forEach(option => {
            const button = document.createElement('button');
            button.className = 'btn';
            button.innerText = option;
            button.onclick = () => handleAnswer(button, option);
            optionsContainer.appendChild(button);
        });
    }

    function handleAnswer(selectedButton, selectedOption) {
        const allButtons = document.querySelectorAll('.options-container .btn');
        
        // Cevap verildikten sonra diğer şıklara tıklanmasın
        allButtons.forEach(btn => btn.disabled = true);

        if (selectedOption === currentQuestion.tr) {
            // DOĞRU CEVAP
            selectedButton.classList.add('correct');
            score += 10;
            document.getElementById('score').innerText = score;
            currentIndex++; // Sıradaki kelimeye geç

            // OK TUŞUNA BASMAYA GEREK KALMADAN OTO GEÇİŞ (0.4 saniye gecikme ile)
            setTimeout(() => {
                loadQuestion();
            }, 400);

        } else {
            // YANLIŞ CEVAP - CHALLENGE MODU (HATA YAPMAMA)
            selectedButton.classList.add('wrong');
            
            // Doğru şıkkı da yeşil gösterelim ki kullanıcı görsün
            allButtons.forEach(btn => {
                if (btn.innerText === currentQuestion.tr) {
                    btn.classList.add('correct');
                }
            });

            // 1 saniye sonra oyunu sıfırla ve baştan başlat
            setTimeout(() => {
                alert(`Challenge başarısız oldu! Yanlış cevap verdiniz.\nToplam Skorunuz: ${score}\nOyun A harfinden yeniden başlayacak.`);
                initGame();
            }, 600);
        }
    }

    // Oyunu başlat
    window.onload = initGame;
