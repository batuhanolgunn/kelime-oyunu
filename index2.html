<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İngilizce Kelime Havuzu Oyunu</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            color: #333;
        }
        .game-container {
            background-color: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 100%;
            max-width: 500px;
            text-align: center;
        }
        .stats {
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            margin-bottom: 20px;
            font-size: 1.1rem;
            color: #555;
        }
        .question-box {
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 30px;
            color: #2d3748;
        }
        .options-container {
            display: grid;
            grid-template-columns: 1fr;
            gap: 15px;
        }
        .btn {
            background-color: #f7fafc;
            border: 2px solid #e2e8f0;
            padding: 15px;
            font-size: 1.1rem;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            outline: none;
            font-weight: 500;
        }
        .btn:hover:not([disabled]) {
            background-color: #edf2f7;
            border-color: #cbd5e0;
            transform: translateY(-2px);
        }
        .btn.correct {
            background-color: #48bb78 !important;
            color: white !important;
            border-color: #38a169 !important;
        }
        .btn.wrong {
            background-color: #f56565 !important;
            color: white !important;
            border-color: #e53e3e !important;
        }
        .next-btn {
            margin-top: 25px;
            background-color: #4c51bf;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1.1rem;
            border-radius: 8px;
            cursor: pointer;
            display: none;
            width: 100%;
        }
        .next-btn:hover {
            background-color: #434190;
        }
    </style>
</head>

    let score = 0;
    let questionCount = 0;
    let currentQuestion = null;

    const questionElement = document.getElementById('question');
    const optionsContainer = document.getElementById('options');
    const nextButton = document.getElementById('next-button');
    const scoreElement = document.getElementById('score');
    const countElement = document.getElementById('question-count');

    function startGame() {
        score = 0;
        questionCount = 0;
        scoreElement.innerText = score;
        nextQuestion();
    }

    function nextQuestion() {
        nextButton.style.display = 'none';
        optionsContainer.innerHTML = '';
        questionCount++;
        countElement.innerText = questionCount;

        const randomIndex = Math.floor(Math.random() * wordPool.length);
        currentQuestion = wordPool[randomIndex];
        questionElement.innerText = currentQuestion.eng;

        let choices = [currentQuestion.tr];
        
        while (choices.length < 4) {
            const randomWrongIndex = Math.floor(Math.random() * wordPool.length);
            const wrongChoice = wordPool[randomWrongIndex].tr;
            if (!choices.includes(wrongChoice)) {
                choices.push(wrongChoice);
            }
        }

        choices.sort(() => Math.random() - 0.5);

        choices.forEach(choice => {
            const button = document.createElement('button');
            button.innerText = choice;
            button.classList.add('btn');
            button.addEventListener('click', () => selectAnswer(button, choice));
            optionsContainer.appendChild(button);
        });
    }

    function selectAnswer(selectedButton, choice) {
        const allButtons = optionsContainer.querySelectorAll('.btn');
        allButtons.forEach(btn => btn.disabled = true);

        if (choice === currentQuestion.tr) {
            selectedButton.classList.add('correct');
            score += 10;
            scoreElement.innerText = score;
        } else {
            selectedButton.classList.add('wrong');
            allButtons.forEach(btn => {
                if (btn.innerText === currentQuestion.tr) {
                    btn.classList.add('correct');
                }
            });
        }
        nextButton.style.display = 'block';
    }

    startGame();
